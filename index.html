<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Eraaa ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
overflow:hidden;

/* langit romantis */

background: radial-gradient(circle at top,#1a1a2e,#0f3460,#16213e);
}

/* bintang */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%{opacity:0.2}
50%{opacity:1}
100%{opacity:0.2}
}

/* tulisan */

.container{
margin-top:30vh;
}

h1{
font-size:42px;
margin-bottom:10px;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

#msg{
display:none;
max-width:500px;
margin:auto;
margin-top:20px;
font-size:20px;
line-height:1.6;
}

/* mawar */

.rose{
position:absolute;
top:-20px;
font-size:24px;
animation:fall linear infinite;
}

/* hati */

.heart{
position:absolute;
top:-20px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px)}
100%{transform:translateY(110vh)}
}

</style>
</head>

<body>

<div class="container">

<h1>Untuk Eraaa ❤️</h1>

<button onclick="openMsg()">Buka Pesan</button>

<div id="msg"></div>

</div>

<script>

/* bintang */

for(let i=0;i<100;i++){

let star=document.createElement("div")

star.className="star"

star.style.left=Math.random()*100+"vw"
star.style.top=Math.random()*100+"vh"

document.body.appendChild(star)

}

/* efek mengetik */

let text = `Eraaa,

Sejak kamu hadir dalam hidupku,
hari-hariku terasa lebih indah.

Kamu adalah alasan
kenapa aku bisa tersenyum
bahkan di hari yang sulit.

Terima kasih sudah ada.

Aku sangat bersyukur mengenalmu ❤️`

let i=0

function type(){

if(i<text.length){

document.getElementById("msg").innerHTML+=text.charAt(i)

i++

setTimeout(type,40)

}

}

/* buka pesan */

function openMsg(){

document.getElementById("msg").style.display="block"

type()

}

/* mawar */

function rose(){

let r=document.createElement("div")

r.className="rose"
r.innerHTML="🌹"

r.style.left=Math.random()*100+"vw"
r.style.animationDuration=(Math.random()*5+5)+"s"

document.body.appendChild(r)

setTimeout(()=>{r.remove()},10000)

}

/* hati */

function heart(){

let h=document.createElement("div")

h.className="heart"
h.innerHTML="💖"

h.style.left=Math.random()*100+"vw"
h.style.animationDuration=(Math.random()*5+5)+"s"

document.body.appendChild(h)

setTimeout(()=>{h.remove()},10000)

}

setInterval(rose,400)
setInterval(heart,700)

</script>

</body>
</html>
