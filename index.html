<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Eraaa ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
overflow:hidden;

/* background romantis */

background: linear-gradient(-45deg,#ff6a88,#ff99ac,#ffb6c1,#ff6a88);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
margin-top:30vh;
animation:fade 3s;
}

h1{
font-size:42px;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff3b6b;
color:white;
cursor:pointer;
margin-top:20px;
}

#msg{
display:none;
max-width:500px;
margin:auto;
font-size:20px;
line-height:1.6;
margin-top:20px;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

/* mawar */

.rose{
position:absolute;
top:-20px;
font-size:24px;
animation:fall linear infinite;
}

/* hati */

.heart{
position:absolute;
top:-20px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px)}
100%{transform:translateY(110vh)}
}

</style>

</head>

<body>

<div class="container">

<h1>Untuk Eraaa ❤️</h1>

<button onclick="openMsg()">Buka Pesan</button>

<div id="msg">

Eraaa,

Sejak kamu hadir dalam hidupku,  
hari-hariku terasa lebih indah.

Terima kasih sudah membuat hidupku
penuh warna dan kebahagiaan.

Aku sangat bersyukur mengenalmu ❤️

</div>

</div>

<script>

/* buka pesan */

function openMsg(){
document.getElementById("msg").style.display="block";
}

/* mawar jatuh */

function rose(){

let r=document.createElement("div")

r.className="rose"
r.innerHTML="🌹"

r.style.left=Math.random()*100+"vw"
r.style.animationDuration=(Math.random()*5+5)+"s"

document.body.appendChild(r)

setTimeout(()=>{r.remove()},10000)

}

/* hati jatuh */

function heart(){

let h=document.createElement("div")

h.className="heart"
h.innerHTML="💖"

h.style.left=Math.random()*100+"vw"
h.style.animationDuration=(Math.random()*5+5)+"s"

document.body.appendChild(h)

setTimeout(()=>{h.remove()},10000)

}

setInterval(rose,400)
setInterval(heart,700)

</script>

</body>
</html>
