<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Untuk Kamu ❤️</title>

<style>

body{
margin:0;
background:#ff6f91;
font-family:Arial;
text-align:center;
color:white;
}

.container{
margin-top:40vh;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff3b6b;
color:white;
cursor:pointer;
}

#msg{
display:none;
font-size:20px;
max-width:400px;
margin:auto;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Untuk Kamu ❤️</h1>

<button onclick="show()">Buka Pesan</button>

<div id="msg">
Sejak kamu hadir,
hidupku terasa lebih indah.

Terima kasih sudah
menjadi bagian dari hidupku ❤️
</div>

</div>

<script>

function show(){
document.getElementById("msg").style.display="block";
}

</script>

</body>
</html>
