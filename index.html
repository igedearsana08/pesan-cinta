<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Untuk Eraaa ❤️</title>

<style>

body{
margin:0;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
font-family:Arial;
text-align:center;
color:white;
overflow:hidden;
}

/* animasi tulisan */

.title{
font-size:40px;
margin-top:30vh;
animation:fade 3s;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff3b6b;
color:white;
cursor:pointer;
margin-top:20px;
}

#msg{
display:none;
font-size:20px;
max-width:500px;
margin:auto;
margin-top:20px;
line-height:1.6;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

/* mawar */

.rose{
position:absolute;
top:-20px;
font-size:24px;
animation:fall linear infinite;
}

/* hati */

.heart{
position:absolute;
top:-20px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px)}
100%{transform:translateY(110vh)}
}

</style>

</head>

<body>

<div class="title">

Untuk Kamu  
<br>
<strong>Eraaa ❤️</strong>

<br>

<button onclick="openMsg()">Buka Pesan</button>

</div>

<div id="msg">

Eraaa,

Sejak kamu hadir dalam hidupku,  
dunia terasa lebih indah.

Terima kasih sudah membuat hari-hariku  
penuh senyuman dan kebahagiaan.

Aku sangat bersyukur mengenalmu ❤️

</div>

<script>

function openMsg(){
document.getElementById("msg").style.display="block";
}

/* mawar */

function rose(){

let r=document.createElement("div")

r.className="rose"
r.innerHTML="🌹"

r.style.left=Math.random()*100+"vw"
r.style.animationDuration=(Math.random()*5+5)+"s"

document.body.appendChild(r)

setTimeout(()=>{r.remove()},10000)

}

/* hati */

function heart(){

let h=document.createElement("div")

h.className="heart"
h.innerHTML="💖"

h.style.left=Math.random()*100+"vw"
h.style.animationDuration=(Math.random()*5+5)+"s"

document.body.appendChild(h)

setTimeout(()=>{h.remove()},10000)

}

setInterval(rose,400)
setInterval(heart,700)

</script>

</body>
</html>
