<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Eraaa ❤️</title>
<style>
body{
  margin:0;
  font-family:'Brush Script MT', cursive;
  color:white;
  overflow:hidden;
  height:100vh;
  background:#000;
}

/* Background */
.background{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-image:url("images.png");
  background-size:cover;
  background-position:center;
  z-index:-2;
}

/* Overlay gelap */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
  z-index:-1;
}

/* Amplop surat */
.envelope{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:200px;
  height:150px;
  background:#ff4d6d;
  border-radius:10px;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:50px;
  transition:0.6s;
  z-index:2;
}
.envelope.open{
  transform:translate(-50%,-50%) rotateX(180deg);
}

/* Container pesan */
.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:70%;
  max-width:480px;
  text-align:justify;
  display:none;
  z-index:1;
}

h1{
  text-align:center;
  font-size:36px;
  margin-bottom:15px;
}

/* Pesan teks */
#msg{
  font-size:22px;
  line-height:1.7;
  text-align:justify;
}

/* jatuh hati */
.fallheart{
  position:absolute;
  top:-20px;
  font-size:24px;
  animation:fall linear infinite;
}
@keyframes fall{
  0%{transform:translateY(-50px)}
  100%{transform:translateY(110vh)}
}

/* klik layar */
.clickheart{
  position:absolute;
  font-size:22px;
  animation:explode 1s forwards;
}
@keyframes explode{
  0%{transform:scale(0)}
  100%{transform:scale(1.5);opacity:0}
}

/* sparkle love */
.sparkle{
  position:absolute;
  font-size:16px;
  opacity:0.8;
  animation:twinkle 3s infinite;
}
@keyframes twinkle{
  0%,100%{opacity:0.5; transform:scale(0.5);}
  50%{opacity:1; transform:scale(1.2);}
}

/* confetti hati */
.confetti{
  position:absolute;
  font-size:24px;
  animation:confettiFall 2s forwards;
}
@keyframes confettiFall{
  0%{opacity:1; transform:translateY(0) rotate(0deg);}
  100%{opacity:0; transform:translateY(100vh) rotate(720deg);}
}
</style>
</head>
<body>
<div class="background"></div>
<div class="overlay"></div>

<!-- Amplop surat -->
<div class="envelope" id="envelope">💌</div>

<!-- Pesan -->
<div class="container" id="container">
<h1>Untuk Eraaa ❤️</h1>
<div id="msg"></div>
</div>

<script>
// Password opsional
// let password = "eraaa";
// let attempt = prompt("Masukkan password untuk membuka pesan romantis:");
// if(attempt !== password){
//     document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:50vh;'>Password salah 😢</h1>";
//     throw "Password salah, hentikan eksekusi";
// }

// Teks romantis
let text = `Eraaa,

Di antara begitu banyak hal di dunia ini,
kamu adalah salah satu yang paling indah
yang pernah hadir dalam hidupku.

Sejak kamu datang,
hari-hariku terasa lebih hangat,
lebih berwarna,
dan lebih berarti.

Mungkin kata-kata ini sederhana,
tetapi perasaanku tidak pernah sederhana
saat menyebut namamu.

Terima kasih sudah ada
di dalam cerita hidupku. ❤️`;

let i=0;
function typeWriter(){
  if(i<text.length){
    document.getElementById("msg").innerHTML+=text.charAt(i);
    i++;
    setTimeout(typeWriter,35);
  } else {
    createConfetti(); // confetti akhir
  }
}

// Buka amplop
document.getElementById("envelope").addEventListener("click", function(){
  this.classList.add("open");
  setTimeout(()=>{
    this.style.display="none";
    let container = document.getElementById("container");
    container.style.display="block";
    typeWriter();
    createSparkleLove(container); // love menyesuaikan pesan
  },600);
});

// jatuh hati (sedikit)
let hearts=["❤️","💖","💗","💘"];
function fallHeart(){
  let h=document.createElement("div");
  h.className="fallheart";
  h.innerHTML=hearts[Math.floor(Math.random()*hearts.length)];
  h.style.left=Math.random()*100+"vw";
  h.style.animationDuration=(Math.random()*5+5)+"s";
  document.body.appendChild(h);
  setTimeout(()=>{h.remove()},10000);
}
setInterval(fallHeart,800);

// klik layar super meriah
document.addEventListener("click",function(e){
  for(let i=0;i<30;i++){
    let h=document.createElement("div");
    h.className="clickheart";
    h.innerHTML=hearts[Math.floor(Math.random()*hearts.length)];
    h.style.left=(e.clientX+Math.random()*200-100)+"px";
    h.style.top=(e.clientY+Math.random()*200-100)+"px";
    h.style.fontSize=(10+Math.random()*30)+"px";
    document.body.appendChild(h);
    setTimeout(()=>{h.remove()},1200);
  }
})

// Sparkle love berlapis & berputar, menyesuaikan kontainer pesan
function createSparkleLove(container){
  let rect = container.getBoundingClientRect();
  let cx = rect.left + rect.width/2;
  let cy = rect.top + rect.height/2;

  let sparkleContainer = document.createElement("div");
  sparkleContainer.style.position="absolute";
  sparkleContainer.style.top=cy+"px";
  sparkleContainer.style.left=cx+"px";
  sparkleContainer.style.transform="translate(-50%,-50%)";
  document.body.appendChild(sparkleContainer);

  let layers = [rect.width/2 + 20, rect.width/2 + 50, rect.width/2 + 80]; 
  layers.forEach(radius=>{
    for(let t=0;t<360;t+=6){
      let rad = t*Math.PI/180;
      let x=16*Math.pow(Math.sin(rad),3)*radius;
      let y=-(13*Math.cos(rad)-5*Math.cos(2*rad)-2*Math.cos(3*rad)-Math.cos(4*rad))*radius/13;
      let s=document.createElement("div");
      s.className="sparkle";
      s.innerHTML="✨";
      s.style.color = Math.random()>0.5 ? "#ff99cc" : "#cc99ff";
      s.style.left = x+"px";
      s.style.top = y+"px";
      sparkleContainer.appendChild(s);

      // animasi berputar perlahan
      let angle = 0;
      setInterval(()=>{
        angle += 0.15;
        let rad2 = t*Math.PI/180 + angle*Math.PI/180;
        let newX = 16*Math.pow(Math.sin(rad2),3)*radius;
        let newY = -(13*Math.cos(rad2)-5*Math.cos(2*rad2)-2*Math.cos(3*rad2)-Math.cos(4*rad2))*radius/13;
        s.style.left = newX+"px";
        s.style.top = newY+"px";
      },60);
    }
  });
}

// Confetti hati
function createConfetti(){
  for(let i=0;i<50;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.innerHTML="💖";
    c.style.left=Math.random()*100+"vw";
    c.style.color = Math.random()>0.5 ? "#ff99cc" : "#cc99ff";
    document.body.appendChild(c);
    setTimeout(()=>{c.remove()},3000);
  }
}

</script>
</body>
</html>
