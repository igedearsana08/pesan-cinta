<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Eraaa ❤️</title>

<style>
body{
  margin:0;
  font-family:'Brush Script MT', cursive;
  color:white;
  overflow:hidden;
  height:100vh;
  background:#000;
}

/* background gambar */
.background{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-image:url("images.png");
  background-size:cover;
  background-position:center;
  z-index:-2;
}

/* overlay gelap */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
  z-index:-1;
}

/* Amplop surat */
.envelope{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:200px;
  height:150px;
  background:#ff4d6d;
  border-radius:10px;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:50px;
  transition:0.5s;
  z-index:2;
}
.envelope.open{
  transform:translate(-50%,-50%) rotateX(180deg);
}

/* Container pesan */
.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:80%;
  max-width:500px;
  text-align:justify;
  display:none;
  z-index:1;
}

/* judul */
h1{
  text-align:center;
  font-size:40px;
  margin-bottom:20px;
}

/* Sparkle love */
.sparkle{
  position:absolute;
  font-size:18px;
  opacity:0.9;
  animation:twinkle 3s infinite;
}

@keyframes twinkle{
  0%,100%{opacity:0.5; transform:scale(0.5);}
  50%{opacity:1; transform:scale(1.2);}
}

/* jatuh hati */
.fallheart{
  position:absolute;
  top:-20px;
  font-size:24px;
  animation:fall linear infinite;
}
@keyframes fall{
  0%{transform:translateY(-50px)}
  100%{transform:translateY(110vh)}
}

/* klik layar */
.clickheart{
  position:absolute;
  font-size:22px;
  animation:explode 1s forwards;
}
@keyframes explode{
  0%{transform:scale(0)}
  100%{transform:scale(1.5);opacity:0}
}

</style>
</head>
<body>

<div class="background"></div>
<div class="overlay"></div>

<!-- Amplop surat -->
<div class="envelope" id="envelope">💌</div>

<!-- Pesan -->
<div class="container" id="container">
<h1>Untuk Eraaa ❤️</h1>
<div id="msg"></div>
</div>

<script>
/* teks romantis */
let text = `Eraaa,

Di antara begitu banyak hal di dunia ini,
kamu adalah salah satu yang paling indah
yang pernah hadir dalam hidupku.

Sejak kamu datang,
hari-hariku terasa lebih hangat,
lebih berwarna,
dan lebih berarti.

Mungkin kata-kata ini sederhana,
tetapi perasaanku tidak pernah sederhana
saat menyebut namamu.

Terima kasih sudah ada
di dalam cerita hidupku. ❤️
`

let i = 0;
function typeWriter(){
  if(i < text.length){
    document.getElementById("msg").innerHTML += text.charAt(i)
    i++;
    setTimeout(typeWriter,35);
  }
}

/* membuka amplop */
document.getElementById("envelope").addEventListener("click", function(){
  this.classList.add("open");
  setTimeout(()=>{
    this.style.display="none";
    document.getElementById("container").style.display="block";
    typeWriter();
    createSparkleLove();
  },600);
});

/* jatuh hati */
let hearts=["❤️","💖","💗","💘","💝"]
function fallHeart(){
  let h=document.createElement("div")
  h.className="fallheart"
  h.innerHTML=hearts[Math.floor(Math.random()*hearts.length)]
  h.style.left=Math.random()*100+"vw"
  h.style.animationDuration=(Math.random()*4+4)+"s"
  document.body.appendChild(h)
  setTimeout(()=>{h.remove()},10000)
}
setInterval(fallHeart,200);

/* klik layar */
document.addEventListener("click",function(e){
  for(let i=0;i<15;i++){
    let h=document.createElement("div")
    h.className="clickheart"
    h.innerHTML=hearts[Math.floor(Math.random()*hearts.length)]
    h.style.left=(e.clientX+Math.random()*100-50)+"px"
    h.style.top=(e.clientY+Math.random()*100-50)+"px"
    document.body.appendChild(h)
    setTimeout(()=>{h.remove()},1000)
  }
})

/* sparkle membentuk love besar di sekeliling pesan */
function createSparkleLove(){
  let container = document.getElementById("container");
  let sparkleContainer = document.createElement("div");
  sparkleContainer.style.position="absolute";
  sparkleContainer.style.top="50%";
  sparkleContainer.style.left="50%";
  sparkleContainer.style.transform="translate(-50%,-50%)";
  document.body.appendChild(sparkleContainer);

  for(let t=0; t<360; t+=6){
    let rad = t*Math.PI/180;
    let x = 20*Math.pow(Math.sin(rad),3)*15;
    let y = -(20*Math.cos(rad)-5*Math.cos(2*rad)-2*Math.cos(3*rad)-Math.cos(4*rad))*15;
    let s = document.createElement("div");
    s.className="sparkle";
    s.innerHTML = Math.random()>0.5 ? "✨" : "💖"; // variasi sparkle
    s.style.color = Math.random()>0.5 ? "#ff99cc" : "#cc99ff"; // pink & ungu
    s.style.left = x+"px";
    s.style.top = y+"px";
    sparkleContainer.appendChild(s);
  }
}
</script>

</body>
</html>
