<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Eraaa ❤️</title>
<style>
html, body {
  margin:0; padding:0; height:100%;
  display:flex; justify-content:center; align-items:center;
  font-family:'Brush Script MT', cursive;
  overflow:hidden; position:relative; flex-direction:column; color:white;
}
.background {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  background-image:url("images.png");
  background-size:cover; background-position:center;
  z-index:-2;
}
.overlay { position:absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.35); z-index:-1; }
.container { width:70%; max-width:480px; text-align:justify; z-index:1; }
h1 { text-align:center; font-size:36px; margin-bottom:15px; }
#msg { font-size:22px; line-height:1.7; text-align:justify; }
.sparkle { position:absolute; font-size:16px; opacity:0.9; animation:twinkle 3s infinite; }
@keyframes twinkle{0%,100%{opacity:0.5; transform:scale(0.5);}50%{opacity:1; transform:scale(1.2);}}
</style>
</head>
<body>
<div class="background"></div>
<div class="overlay"></div>
<div class="container" id="container">
  <h1>Untuk Eraaa ❤️</h1>
  <div id="msg">Eraaa, kamu adalah hal paling indah dalam hidupku. 💖✨</div>
</div>

<script>
function createHeartLove() {
  const container = document.getElementById("container");
  const rect = container.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  
  const heartCount = 300;
  for(let i=0;i<heartCount;i++){
    const angle = Math.random() * Math.PI;
    const t = i/heartCount * Math.PI; // 0 → π untuk bentuk love
    // Rumus heart 3D parametric
    const x = 16*Math.pow(Math.sin(t),3);
    const y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
    const s = document.createElement("div");
    s.className="sparkle";
    s.innerHTML="✨";
    s.style.color = Math.random()>0.5 ? "#ff99cc" : "#cc99ff";
    s.style.left = cx + x*10 + (Math.random()*10-5) + "px";
    s.style.top = cy - y*10 + (Math.random()*10-5) + "px";
    container.appendChild(s);

    let angleRotate = 0;
    setInterval(()=>{
      angleRotate += 0.02;
      const newX = 16*Math.pow(Math.sin(t+angleRotate),3);
      const newY = 13*Math.cos(t+angleRotate)-5*Math.cos(2*(t+angleRotate))
                   -2*Math.cos(3*(t+angleRotate))-Math.cos(4*(t+angleRotate));
      s.style.left = cx + newX*10 + (Math.random()*10-5) + "px";
      s.style.top = cy - newY*10 + (Math.random()*10-5) + "px";
    },50);
  }
}

window.onload = createHeartLove;
</script>
</body>
</html>
