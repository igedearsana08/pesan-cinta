<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Eraaa ❤️</title>
<style>
body{
  margin:0;
  font-family:'Brush Script MT', cursive;
  color:white;
  height:100vh;
  background:#000 url("images.png") center center / cover no-repeat;
  overflow:hidden;
}
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
  z-index:-1;
}
.envelope{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:200px;
  height:150px;
  background:#ff4d6d;
  border-radius:10px;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:50px;
  transition:0.6s;
  z-index:2;
}
.envelope.open{
  transform:translate(-50%,-50%) rotateX(180deg);
}
.container{
  position:absolute;
  top:10%;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  max-width:500px;
  max-height:80vh;
  text-align:justify;
  display:none;
  z-index:1;
  overflow-y:auto;
  padding:20px;
  box-sizing:border-box;
  background:rgba(0,0,0,0.3);
  border-radius:15px;
}
h1{
  text-align:center;
  font-size:45px;
  margin-bottom:20px;
}
#msg{
  font-size:26px;
  line-height:1.7;
  text-align:justify;
}
.animations{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:10;
}
/* jatuh hati perlahan */
.fallheart{
  position:absolute;
  font-size:28px;
  animation:fall linear infinite;
}
@keyframes fall{
  0%{transform:translateY(-50px);}
  100%{transform:translateY(110vh);}
}
/* klik layar ledakan jantung */
.clickheart{
  position:absolute;
  font-size:24px;
  opacity:1;
}
.confetti{
  position:absolute;
  font-size:28px;
  animation:confettiFall 2s forwards;
}
@keyframes confettiFall{
  0%{opacity:1; transform:translateY(0) rotate(0deg);}
  100%{opacity:0; transform:translateY(100vh) rotate(720deg);}
}
/* animasi suprise scale */
@keyframes beat{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.3);}
}
</style>
</head>
<body>
<div class="overlay"></div>

<div class="envelope" id="envelope">💌</div>

<div class="container" id="container">
<h1>Untuk Eraaa ❤️</h1>
<div id="msg"></div>
</div>

<div class="animations" id="animations"></div>

<script>
// preload background supaya langsung muncul
const bgImg = new Image();
bgImg.src = "images.png";
bgImg.onload = ()=>{
  document.body.style.background = `#000 url("${bgImg.src}") center center / cover no-repeat`;
};

// teks romantis
let text = `Eraaa,

Di antara begitu banyak hal di dunia ini,
kamu adalah salah satu yang paling indah
yang pernah hadir dalam hidupku.

Sejak kamu datang,
hari-hariku terasa lebih hangat,
lebih berwarna,
dan lebih berarti.

Mungkin kata-kata ini sederhana,
tetapi perasaanku tidak pernah sederhana
saat menyebut namamu.

Terima kasih sudah ada
di dalam cerita hidupku. ❤️`;

let i=0;
function typeWriter(){
  const msgElement = document.getElementById("msg");
  msgElement.innerHTML = "";
  function typing(){
    if(i<text.length){
      msgElement.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing,35);
    } else {
      createConfetti();
    }
  }
  typing();
}

// jatuh hati perlahan
let hearts=["❤️","💖","💗","💘","💞","💕","💝"];
function fallHeart(){
  let h=document.createElement("div");
  h.className="fallheart";
  h.innerHTML=hearts[Math.floor(Math.random()*hearts.length)];
  h.style.left = Math.random()*90+"vw";
  h.style.animationDuration=(Math.random()*5+5)+"s";
  h.style.color = Math.random()>0.5 ? "red" : "pink";
  document.getElementById("animations").appendChild(h);
  setTimeout(()=>{h.remove()},10000);
}
setInterval(fallHeart,700);

// klik layar -> ledakan jantung berterbangan
document.addEventListener("click", function(e){
  const animContainer = document.getElementById("animations");
  const count = 120;
  for(let i=0;i<count;i++){
    let h = document.createElement("div");
    h.className="clickheart";
    h.innerHTML = hearts[Math.floor(Math.random()*hearts.length)];
    h.style.left = e.clientX + "px";
    h.style.top = e.clientY + "px";
    h.style.fontSize = (15 + Math.random()*30) + "px";
    h.style.color = Math.random()>0.5 ? "red":"pink";
    h.style.opacity = 1;
    h.style.transition = "transform 1.8s ease-out, opacity 1.8s ease-out";

    animContainer.appendChild(h);

    const angle = Math.random() * 2 * Math.PI;
    const distance = 100 + Math.random()*250;
    const dx = Math.cos(angle)*distance;
    const dy = Math.sin(angle)*distance;

    requestAnimationFrame(()=>{
      h.style.transform = `translate(${dx}px, ${dy}px) rotate(${Math.random()*720}deg) scale(1.2)`;
      h.style.opacity = 0;
    });

    setTimeout(()=>{h.remove()},1900);
  }
});

// buka amplop
document.getElementById("envelope").addEventListener("click", function(){
  this.classList.add("open");
  setTimeout(()=>{
    this.style.display="none";

    // tampilkan suprise!!
    const animContainer = document.getElementById("animations");
    let surprise = document.createElement("div");
    surprise.innerText = "SUPRISE!!";
    surprise.style.position = "fixed";
    surprise.style.top = "50%";
    surprise.style.left = "50%";
    surprise.style.transform = "translate(-50%,-50%)"; // pastikan tepat tengah
    surprise.style.fontSize = "60px";
    surprise.style.color = "yellow";
    surprise.style.fontWeight = "bold";
    surprise.style.textAlign = "center";
    surprise.style.zIndex = "20";
    surprise.style.animation = "beat 0.8s infinite";
    animContainer.appendChild(surprise);

    // setelah 3 detik hilang animasi suprise
    setTimeout(()=>{
      surprise.style.transition = "opacity 1s ease-out";
      surprise.style.opacity = 0;
      setTimeout(()=>{surprise.remove();},1000);

      // munculkan container dan ketik teks
      const container = document.getElementById("container");
      container.style.display="block";
      typeWriter();
    },3000);

  },600);
});

// confetti hati setelah teks selesai
function createConfetti(){
  const animContainer = document.getElementById("animations");
  for(let i=0;i<70;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.innerHTML="💖";
    c.style.left = Math.random()*90+"vw";
    c.style.color = Math.random()>0.5 ? "#ff99cc" : "#cc99ff";
    animContainer.appendChild(c);
    setTimeout(()=>{c.remove()},3500);
  }
}
</script>
</body>
</html>
